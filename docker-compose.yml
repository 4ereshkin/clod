services:
  postgresql:
    build: .
    container_name: lidar_db
    restart: unless-stopped
    
    environment:
      - "POSTGRES_DB=pointcloud_db"
      - "POSTGRES_PASSWORD=postgres"
    
    ports:
      - "5433:5432"
    
    volumes:
      - D:/Docker/postgresql_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pointcloud_db"]
      interval: 1m30s
      timeout: 5s
      retries: 5
      start_period: 30s
