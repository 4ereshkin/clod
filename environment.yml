name: prod_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - pandas>=3.0
  - scipy
  - scikit-learn
  - matplotlib
  - pillow
  - sqlalchemy
  - psycopg2>=2.9.10
  - flask
  - dash
  - plotly
  - pydantic
  - aiohttp
  - boto3
  - cryptography
  - open3d=0.19.0
  - pdal
  - python-pdal
  - gdal
  - pyproj
  - hdbscan
  - ipykernel
  - ipywidgets
  - pip
  - pip:
    - aio-pika
    - aioredis
    - customtkinter
    - darkdetect
    - laspy
    - signalrcore
    - temporalio
    - nexus-rpc
    - python-ulid